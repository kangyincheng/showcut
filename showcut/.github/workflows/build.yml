name: Build ShowCut

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyQt5 Pillow pyinstaller

      - name: Generate icon
        run: |
          if (Test-Path create_icon.py) {
            python create_icon.py
          } else {
            Write-Host "create_icon.py not found, skipping icon generation"
          }
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          $iconArg = ""
          if (Test-Path icon.ico) {
            $iconArg = "--icon=icon.ico"
          }
          python -m PyInstaller --noconfirm --onefile --windowed --name ShowCut $iconArg --hidden-import=PyQt5 --hidden-import=PyQt5.QtCore --hidden-import=PyQt5.QtGui --hidden-import=PyQt5.QtWidgets main.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShowCut-Windows
          path: dist/ShowCut.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ShowCut.exe
          body: |
            ## ShowCut Screenshot Tool

            ### Features
            - Screenshot with window auto-alignment
            - Annotation tools: Rectangle, Ellipse, Line, Arrow, Polygon, Text
            - Orthogonal positioning (8-direction constraint)
            - Custom line styles: color, width, dashed/solid
            - Translation
            - Custom keyboard shortcuts

            ### Usage
            1. Download ShowCut.exe
            2. Double-click to run (portable, no install needed)
            3. Click "Start Capture" or press Ctrl+Shift+A
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
